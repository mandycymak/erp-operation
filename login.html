<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Control Tower</title>
<script>
// Apply the saved theme before paint (no flash). Absent = follow the device.
(function(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
</script>
<link rel="stylesheet" href="styles.css">
<style>
  .loginwrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .logincard { width: 340px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px; }
  .logincard h1 { font-size: 20px; margin: 0 0 4px; }
  .logincard .sub { color: var(--mut); font-size: 13px; margin-bottom: 18px; }
  .logincard label { display: block; font-size: 12px; color: var(--mut); margin: 12px 0 4px; }
  .logincard input { width: 100%; box-sizing: border-box; padding: 10px; font-size: 14px; }
  .logincard button { width: 100%; margin-top: 18px; padding: 11px; border: 0; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .logincard button:disabled { opacity: .6; cursor: default; }
  .loginerr { color: var(--r); font-size: 13px; margin-top: 12px; min-height: 18px; }
</style>
</head>
<body>
<div class="loginwrap">
  <form class="logincard" id="loginForm">
    <h1 id="brandingTitle">Control Tower</h1>
    <div class="sub" data-i18n>Sign in to continue</div>
    <label for="u" data-i18n>Email or username</label>
    <input id="u" type="text" autocomplete="username" placeholder="you@example.com or username" autofocus>
    <label for="p" data-i18n>Password</label>
    <input id="p" type="password" autocomplete="current-password">
    <button type="submit" id="btn" data-i18n>Sign in</button>
    <div class="loginerr" id="err"></div>
    <div style="margin-top:16px;text-align:center"><select id="langPicker" class="ghost" style="font-size:12px" title="Language"></select></div>
  </form>
</div>
<script src="i18n.js"></script>
<script>
// No logged-in profile here, so language comes from this device's choice / the browser, then English.
if (window.I18N) I18N.boot().then(function () {
  var sel = document.getElementById('langPicker'); if (!sel) return;
  var sup = I18N.supported || { en: 'English' };
  Object.keys(sup).forEach(function (code) { var o = document.createElement('option'); o.value = code; o.textContent = sup[code]; if (code === I18N.current()) o.selected = true; sel.appendChild(o); });
  sel.style.display = Object.keys(sup).length > 1 ? '' : 'none';
  sel.onchange = function () { I18N.setLang(sel.value); };
});
(function () {
  fetch('/api-ops/config').then(function (r) { return r.ok ? r.json() : Promise.reject(); }).then(function (cfg) {
    var name = (cfg.appName || 'Control Tower') + (cfg.instanceName ? ' — ' + cfg.instanceName : '');
    document.title = tr('Sign in') + ' — ' + name;
    var h = document.getElementById('brandingTitle'); if (h) h.textContent = name;
  }).catch(function () {});
})();
var f = document.getElementById("loginForm"), btn = document.getElementById("btn"), err = document.getElementById("err");
f.addEventListener("submit", async function (e) {
  e.preventDefault(); err.textContent = ""; btn.disabled = true; btn.textContent = tr("Signing in…");
  try {
    var r = await fetch("/api-ops/login", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: document.getElementById("u").value, password: document.getElementById("p").value }) });
    if (r.ok) { location.href = "index.html"; return; }
    var d = {}; try { d = await r.json(); } catch (e2) {}
    err.textContent = d.error || tr("Sign in failed");
  } catch (e3) { err.textContent = tr("Cannot reach the service."); }
  btn.disabled = false; btn.textContent = tr("Sign in");
});
</script>
</body>
</html>
