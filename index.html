<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Tower</title>
<script>
// Apply the saved theme before the stylesheet paints (no flash). Absent = follow the device.
(function(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1 id="appName">Control Tower</h1>
  <span class="sub" id="appSub"></span>
  <span class="spacer"></span>
  <span class="muted" id="userbar" style="font-size:12px"></span>
  <span class="muted" id="opLabel" style="font-size:12px">Operator</span>
  <select id="userPicker" title="View as operator (demo identity)"></select>
  <button class="ghost themebtn" id="themeBtn" title="Switch theme (Auto / Light / Dark)">Auto</button>
  <button class="ghost" id="tasksBtn" title="My Tasks inbox">My Tasks <span class="badge" id="taskBadge" style="display:none">0</span></button>
  <button class="ghost" id="refreshBtn" title="Refresh">↻</button>
</header>

<div class="wrap">
  <div class="col">
    <div class="lens">
      <span class="vctl" id="viewControls">
        <div class="seg" id="modeSeg">
          <button data-tmode="Sea">🚢 Sea</button>
          <button data-tmode="Air">✈ Air</button>
        </div>
        <div class="seg" id="boundSeg">
          <button data-bound="Import">Import</button>
          <button data-bound="Export">Export</button>
        </div>
        <div class="seg" id="lensSeg">
          <button data-lens="mine" class="on">My work</button>
          <button data-lens="user">Teammate</button>
          <button data-lens="all">All</button>
        </div>
        <select id="teammate" style="display:none"></select>
        <select id="stationPicker" title="Filter by station (office)"><option value="">All stations</option></select>
      </span>
      <span class="spacer"></span>
      <button class="ghost" id="collapseAll" style="font-size:12px">⊖ Collapse all</button>
      <button class="ghost" id="toggleFilters" style="font-size:12px">Hide filters</button>
      <span class="muted" id="wlCount" style="font-size:12px"></span>
    </div>
    <div class="filters" id="filters">
      <label class="fl"><input type="text" class="datebox" id="fFrom" placeholder="yyyy-mm-dd" maxlength="10" inputmode="numeric" autocomplete="off" title="Window start — format yyyy-mm-dd. Shows shipments moving, with work due, or created in the window; work overdue up to 30 days also shows."></label>
      <span class="fl">→</span>
      <label class="fl"><input type="text" class="datebox" id="fTo" placeholder="yyyy-mm-dd" maxlength="10" inputmode="numeric" autocomplete="off" title="Window end — format yyyy-mm-dd. Shows shipments moving, with work due, or created in the window; work overdue up to 30 days also shows."></label>
      <button class="ghost" id="thisWeek" title="Click to cycle the date window: This week -> Last week to today -> Custom (clears the boxes so you can type any range). 'This week' = shipments moving, due, or created this week, plus work overdue up to 30 days.">This week</button>
      <span class="searchbox">
        <select class="sf" id="fSearchField" title="What to search">
          <option value="company">Company</option>
          <option value="job">Job No</option>
          <option value="booking">Booking / SO</option>
          <option value="po">PO</option>
          <option value="house">House B/L</option>
          <option value="master">Master B/L</option>
          <option value="conv">Vessel / Flight</option>
        </select>
        <span class="combo" id="companyCombo">
          <input type="text" id="fCompany" autocomplete="off" placeholder="Company name…" title="Company: matches shipper, consignee, agent or controlling customer. Pick a number type to find a file by its ID (ignores the date window).">
          <button class="combo-x" id="fCompanyClear" title="Clear search" style="display:none">✕</button>
          <div class="mention-pop" id="fCompanyPop"></div>
        </span>
      </span>
      <span class="combo portchips" id="fPolChips" title="Port of loading — type a code or name (e.g. tokyo, HKHKG, jp:tok); pick several">
        <input type="text" placeholder="POL…" autocomplete="off"><div class="mention-pop"></div><span class="chiprow"></span>
      </span>
      <span class="combo portchips" id="fPodChips" title="Port of discharge — type a code or name; pick several">
        <input type="text" placeholder="POD…" autocomplete="off"><div class="mention-pop"></div><span class="chiprow"></span>
      </span>
      <button class="ghost iconbtn" id="fAlerts" title="Alerts — show only shipments with a red or amber alert (within the current view)" aria-label="Alerts">⚠</button>
      <button class="ghost iconbtn" id="fNotes" title="My notes — show shipments with an open note or reminder of mine (any date, so a note never gets lost). Mark the note done to clear it from here." aria-label="My notes">💬</button>
    </div>
    <div id="inboundPanel" class="inbound" style="display:none"></div>
    <div id="worklist"><div class="empty">Loading…</div></div>
  </div>

  <div class="side">
    <div class="panel" id="tasksPanel">
      <h3>My Tasks <span class="badge" id="taskBadge2" style="display:none">0</span></h3>
      <div style="font-size:12px" class="muted">Reminders others sent me, and ones I'm waiting on.</div>
      <div id="tasksBody"><div class="empty">Loading…</div></div>
    </div>
  </div>
</div>

<div class="drawer-bg" id="drawerBg"></div>
<aside class="drawer" id="drawer">
  <div class="dh">
    <span class="dot" id="dLight"></span>
    <strong id="dJob">—</strong>
    <span class="muted" id="dLane" style="font-size:12px"></span>
    <span class="spacer"></span>
    <button class="ghost" id="closeDrawer">✕</button>
  </div>
  <div class="body" id="drawerBody"></div>
</aside>

<script src="ops.js"></script>
</body>
</html>
