<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit ERP data</title>
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --fg:#1c2330; --mut:#6b7280; --line:#d7dce4; --accent:#2563eb; --chg:#fff7d6; --chgline:#e3b400; --bad:#b42318; --ok:#0f7b3f; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f141b; --card:#161d27; --fg:#e6eaf0; --mut:#9aa6b5; --line:#2a3340; --accent:#5b9bff; --chg:#3a3413; --chgline:#b89400; --bad:#ff6a5a; --ok:#4ed08a; }
  }
  *{ box-sizing:border-box }
  body{ font:14px/1.45 -apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; background:var(--bg); color:var(--fg) }
  .wrap{ max-width:1000px; margin:0 auto; padding:16px; overflow-x:clip }
  .bar{ display:flex; align-items:center; gap:10px; padding:6px 0 10px; flex-wrap:wrap }
  .bar h1{ font-size:18px; margin:0 }
  .sub{ color:var(--mut); font-size:13px }
  .spacer{ flex:1 }
  button{ font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--fg); border-radius:6px; padding:6px 12px }
  button.primary{ background:var(--accent); border-color:var(--accent); color:#fff }
  button:disabled{ opacity:.55; cursor:default }
  .note{ font-size:12px; color:var(--mut) }
  #msg .err{ background:rgba(180,35,24,.12); border:1px solid var(--bad); color:var(--bad); border-radius:6px; padding:8px 10px; margin-bottom:10px }
  #msg .ok{ background:rgba(15,123,63,.12); border:1px solid var(--ok); color:var(--ok); border-radius:6px; padding:8px 10px; margin-bottom:10px }
  .steps{ font-size:12px; color:var(--mut); margin-top:6px; white-space:pre-wrap }

  /* HBL grid */
  .billtitle{ text-align:center; font-weight:700; letter-spacing:.06em; font-size:14px; padding:8px 0; color:var(--fg) }
  .gbill{ border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--card) }
  .grow{ display:flex }
  .gbox{ border-right:1px solid var(--line); border-bottom:1px solid var(--line); padding:7px 10px; min-width:0; box-sizing:border-box }
  .grow:last-child > .gbox{ border-bottom:0 }
  .gbox:last-child{ border-right:0 }
  /* two-column upper region: parties stack on the left, refs/stakeholders + service + remark on the right */
  .upper{ display:flex }
  .upper > .col{ flex:1 1 50%; min-width:0; display:flex; flex-direction:column }
  .upper > .col-left{ border-right:1px solid var(--line) }
  .upper .gbox{ border-right:0 }
  .upper .col-right .grow > .gbox:first-child{ border-right:1px solid var(--line) }
  .upper .col > .gbox:last-child{ border-bottom:0 }
  .gbox.remarkbox{ display:flex; flex-direction:column; flex:1 }
  textarea.pin.fill{ flex:1; min-height:60px }
  @media (max-width:720px){ .grow{ flex-wrap:wrap } .gbox{ flex-basis:100% !important; max-width:100% !important; border-right:0 } .upper{ flex-direction:column } .upper > .col-left{ border-right:0 } }

  .cap{ font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:var(--mut); font-weight:700; display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:3px }
  .cap .tag{ font-size:9.5px; color:var(--mut); border:1px solid var(--line); border-radius:8px; padding:0 5px; font-weight:600 }
  .codechip{ display:inline-flex; align-items:center; gap:2px; color:var(--mut); font-weight:700; text-transform:none }
  .codechip input{ border:1px solid var(--line); background:var(--bg); border-radius:5px; width:66px; font:700 11px ui-monospace,Consolas,monospace; color:var(--accent); padding:1px 5px; text-align:center }
  .codechip input:disabled{ color:var(--mut); background:transparent; border-color:transparent }
  .findbtn{ border:0; background:transparent; cursor:pointer; font-size:11px; padding:0 1px; color:var(--mut) }
  .fillbtn{ border:0; background:transparent; cursor:pointer; font-size:12px; padding:0 2px; margin-left:2px; color:var(--accent,#2d7ef7) }
  .fillbtn:hover{ text-shadow:0 0 1px currentColor }
  .fillbtn.err{ color:var(--r,#c0392b) }
  .fillbtn[disabled]{ opacity:.5; cursor:default }
  .rhint{ font-size:11px; color:var(--mut); margin:0 0 4px; min-height:13px }
  .boxval{ font-size:13px; color:var(--fg); min-height:16px; padding:1px 0 }
  .refline{ font-size:12px; color:var(--fg); padding:1px 0 }
  .refline .rl{ color:var(--mut) }
  .refline.muted{ color:var(--mut) }

  .pin{ width:100%; font:inherit; color:var(--fg); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:4px 7px; margin-bottom:4px }
  textarea.pin{ min-height:42px; resize:vertical }
  textarea.partybox{ min-height:30px }

  /* SERVICE DETAIL box: small labelled controls grouped into shipping-window / service / internal */
  .svc-sub{ font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--mut); font-weight:700; border-bottom:1px solid var(--line); margin:7px 0 3px; padding-bottom:2px }
  .svc-grid{ display:flex; flex-wrap:wrap; gap:5px 12px }
  .svc-grid.g4{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px 10px; align-items:start }
  .svc-grid.cargo-row{ align-items:end }
  .svc-f{ display:flex; flex-direction:column; gap:1px; min-width:92px; flex:1 1 92px }
  .svc-grid.g4 > .svc-f{ min-width:0 }
  .svc-f input[type=checkbox]{ width:15px; height:15px; align-self:flex-start; margin-top:3px }
  .svc-f.svc-bool{ flex-direction:row; align-items:center; gap:6px; flex:0 0 auto; min-width:0 }
  .svc-l{ font-size:9.5px; text-transform:uppercase; letter-spacing:.02em; color:var(--mut); font-weight:700 }
  .svc-in{ width:100%; font:inherit; color:var(--fg); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:3px 6px }
  .svc-v{ font-size:13px; color:var(--fg); min-height:16px }
  .svc-bool input{ width:15px; height:15px }
  .svc-code{ flex:1 1 130px; gap:2px }
  .svc-code .codechip{ font-size:11px }
  .svc-hint{ font-size:11px; color:var(--mut); min-height:13px }
  input.svc-in.chg{ background:var(--chg); border-color:var(--chgline) }
  input.refin.chg{ background:var(--chg); border-color:var(--chgline) }
  input[type=checkbox].chg{ outline:2px solid var(--chgline); outline-offset:1px }
  .svc-note{ font-size:11px; color:var(--mut); margin-top:7px; font-style:italic }
  /* Air flight-routing legs (compact, under Job No.): flight no -> leg discharge chip, one small line per leg */
  .fleg{ margin-top:6px; border-top:1px solid var(--line); padding-top:5px }
  .fleg-cap{ font-size:9px; text-transform:uppercase; letter-spacing:.03em; color:var(--mut); font-weight:700; margin-bottom:3px }
  .fleg-row{ display:flex; align-items:center; gap:5px; margin-bottom:3px; min-height:18px }
  .fleg-n{ font-size:9px; font-weight:700; color:var(--mut); min-width:16px }
  .fleg-fin{ width:62px; font:600 10px ui-monospace,Consolas,monospace; color:var(--fg); background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:1px 4px; text-transform:uppercase }
  .fleg-arr{ color:var(--mut); font-size:10px }
  .fleg-hint{ font-size:9.5px; color:var(--mut); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90px }
  .fleg .codechip input{ width:42px; font-size:10px; padding:1px 3px }
  .fleg .findbtn{ font-size:10px }
  /* editable reference / carrier inputs */
  .refedit{ font-size:12px; margin:1px 0; display:flex; align-items:center; gap:4px }
  .refedit .rl{ flex:0 0 86px }
  .refin{ font:inherit; color:var(--fg); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:2px 6px; flex:1; min-width:60px }
  .refin.code{ flex:0 0 74px; min-width:0; font:700 11px ui-monospace,Consolas,monospace; color:var(--accent); text-align:center }
  .carrow{ display:flex; gap:5px; margin-top:1px }
  .telrow{ display:flex; gap:6px; margin-top:1px }
  .telcell{ flex:1 } .telcell .tl{ font-size:10px; color:var(--mut); display:block; margin-bottom:1px }
  .minip{ margin-bottom:7px } .minip:last-child{ margin-bottom:0 }
  .minilab{ font-size:10px; text-transform:uppercase; color:var(--mut); font-weight:700; display:flex; gap:5px; align-items:center }
  .chg{ background:var(--chg) !important; border-color:var(--chgline) !important }

  table.ctab{ width:100%; border-collapse:collapse; font-size:13px }
  table.ctab th{ text-align:left; color:var(--mut); font-weight:600; padding:4px 6px; border-bottom:1px solid var(--line); font-size:11px; text-transform:uppercase }
  table.ctab td{ padding:3px 6px; border-bottom:1px solid var(--line) }
  table.ctab input{ width:100%; font:inherit; color:var(--fg); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:4px 6px }

  .extra-sect{ margin-top:12px; display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap }
  .seccard{ flex:1 1 100%; background:var(--card); border:1px dashed var(--line); border-radius:8px; padding:12px 14px; color:var(--mut); font-size:13px }
  .seccard b{ color:var(--fg) }

  .lookup{ position:relative }
  .lookbox{ position:absolute; z-index:40; left:0; top:100%; min-width:230px; background:var(--card); border:1px solid var(--line); border-radius:6px; margin-top:3px; max-height:240px; overflow:auto; box-shadow:0 6px 20px rgba(0,0,0,.20) }
  .lookbox .lq{ width:100%; border:0; border-bottom:1px solid var(--line); border-radius:6px 6px 0 0; padding:6px 8px; background:var(--card); color:var(--fg); font:inherit }
  .lookbox .li{ padding:6px 9px; cursor:pointer; border-top:1px solid var(--line); font-size:13px }
  .lookbox .li:hover{ background:var(--bg) }
  .lookbox .li b{ font-family:ui-monospace,Consolas,monospace }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <h1 id="status">Edit ERP data</h1>
    <span class="spacer"></span>
    <button id="saveBtn" class="primary">Save changes to ERP</button>
    <button onclick="window.close()">Close</button>
  </div>
  <div class="sub" id="sub"></div>
  <div id="msg"></div>
  <div id="sections"><div class="gbill" style="padding:14px">Loading shipment from the ERP...</div></div>
</div>
<script src="/erp-edit.js"></script>
</body>
</html>
